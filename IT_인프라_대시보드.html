<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>IT 인프라 통합 조회 시스템 v1.2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #0d0f14; color: #e2e6f0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .upload-section { background: #1a1e28; padding: 20px; border-radius: 10px; border: 2px dashed #509ee3; text-align: center; margin-bottom: 20px; }
        .kpi-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: #1a1e28; border: 1px solid #252a38; padding: 15px; border-radius: 10px; flex: 1; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: #1a1e28; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #252a38; font-size: 13px; text-align: left; }
        th { background: #252a38; color: #509ee3; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>IT 인프라 자산 매핑 대시보드</h2>

    <div class="upload-section">
        <p>📊 관리 중인 <b>인프라 자산 엑셀 파일</b>을 선택하세요.</p>
        <input type="file" id="excelInput" accept=".xlsx, .xls" />
    </div>

    <div class="kpi-container">
        <div class="kpi-card"><div>전체 자산</div><div id="totalCnt" style="font-size:24px; font-weight:bold;">0</div></div>
        <div class="kpi-card"><div style="color:#e05c5c;">EOS 위험</div><div id="eosCnt" style="font-size:24px; font-weight:bold; color:#e05c5c;">0</div></div>
        <div class="kpi-card"><div style="color:#5ce08a;">표준 준수율</div><div id="standardRate" style="font-size:24px; font-weight:bold; color:#5ce08a;">0%</div></div>
    </div>

    <table id="assetTable">
        <thead>
            <tr>
                <th>호스트명</th>
                <th>카테고리</th>
                <th>현재 버전</th>
                <th>표준 버전</th>
                <th>EOS 상태</th>
                <th>담당 부서</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center;">파일을 업로드하면 데이터가 표시됩니다.</td></tr>
        </tbody>
    </table>
</div>

<script>
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            // 첫 번째 시트의 데이터를 JSON으로 변환 [cite: 103-105]
            const sheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[sheetName];
            const json = XLSX.utils.sheet_to_json(sheet);
            
            processData(json);
        };
        reader.readAsArrayBuffer(file);
    });

    function processData(data) {
        // 데이터 매핑 및 화면 렌더링 [cite: 222-277]
        const body = document.getElementById('tableBody');
        let eosCount = 0;
        let standardCount = 0;

        body.innerHTML = data.map(row => {
            // 엑셀 컬럼명에 맞춰 매핑 (컬럼명이 다를 경우 아래 이름을 수정하세요)
            const name = row['호스트명'] || row['Hostname'] || '-';
            const cat = row['카테고리'] || row['Category'] || '-';
            const cur = row['현재버전'] || row['Current'] || '-';
            const std = row['표준버전'] || row['Standard'] || '-';
            const eos = row['EOS상태'] || row['Status'] || '-';
            const dept = row['담당부서'] || row['Dept'] || '-';

            if(eos.includes('경과') || eos.includes('위험')) eosCount++;
            if(cur === std) standardCount++;

            return `
                <tr>
                    <td><b>${name}</b></td>
                    <td>${cat}</td>
                    <td>${cur}</td>
                    <td>${std}</td>
                    <td style="color:${eos.includes('경과') ? '#e05c5c' : ''}">${eos}</td>
                    <td>${dept}</td>
                </tr>
            `;
        }).join('');

        // KPI 업데이트 [cite: 75-81]
        document.getElementById('totalCnt').innerText = data.length;
        document.getElementById('eosCnt').innerText = eosCount;
        document.getElementById('standardRate').innerText = Math.round((standardCount / data.length) * 100) + '%';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT 인프라 자산 표준화 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #0d0f14; --surface: #13161e; --surface2: #1a1e28;
  --border: #252a38; --text: #e2e6f0; --muted: #7a8099;
  --meta-primary: #509ee3; --meta-accent: #74b9f8;
  --red: #e05c5c; --yellow: #e0c45c; --green: #5ce08a;
}
* { margin:0; padding:0; box-sizing:border-box; outline:none; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans KR', sans-serif; min-height: 100vh; padding-bottom: 50px;}
.top-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
.nav-logo { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 0.5px; }
.nav-logo span { color: var(--meta-accent); }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.upload-card { background: var(--surface2); border: 1px dashed var(--meta-primary); border-radius: 12px; padding: 30px; text-align: center; margin-bottom: 24px; cursor: pointer; }
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; border-top: 3px solid var(--meta-primary); }
.kpi-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; }
.kpi-value { font-size: 32px; font-weight: 700; font-family: 'Syne', sans-serif; }
.chart-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: 320px; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.table-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
th { background: #1a1e28; padding: 14px 20px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
td { padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-logo">IT INFRA <span>DASHBOARD</span></div>
</nav>

<div class="container">
  <div class="upload-card" onclick="document.getElementById('file-input').click()">
    <p style="font-size:16px; font-weight:600; color:var(--meta-accent);">📂 엑셀(CSV) 업로드: 데이터 실시간 동기화</p>
    <input type="file" id="file-input" style="display:none" accept=".xlsx, .xls, .csv">
  </div>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">전체 시스템 수</div>
      <div class="kpi-value" id="total-val" style="color:var(--meta-accent)">0</div>
    </div>
    <div class="kpi-card" style="border-top-color: var(--green)">
      <div class="kpi-label">표준화 준수율</div>
      <div class="kpi-value" id="rate-val" style="color:var(--green)">0%</div>
    </div>
    <div class="kpi-card" style="border-top-color: var(--yellow)">
      <div class="kpi-label">버전 패치 필요</div>
      <div class="kpi-value" id="upgrade-val" style="color:var(--yellow)">0</div>
    </div>
    <div class="kpi-card" style="border-top-color: var(--red)">
      <div class="kpi-label">EOS / 위험 상태</div>
      <div class="kpi-value" id="eos-val" style="color:var(--red)">0</div>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-card"><canvas id="barChart"></canvas></div>
    <div class="chart-card"><canvas id="pieChart"></canvas></div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>장비명(Hostname)</th>
          <th>구분 / 제조사</th>
          <th>현재 버전</th>
          <th>권고 버전</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="5" style="text-align:center; padding:100px; color:var(--muted);">파일을 업로드하면 데이터가 분석됩니다.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let charts = {};

document.getElementById('file-input').addEventListener('change', function(e) {
  const reader = new FileReader();
  reader.onload = (event) => {
    const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(sheet, {header: 1});
    
    // 데이터 시작 행(Header) 탐지 로직
    let headerIdx = 0;
    for(let i=0; i<Math.min(10, raw.length); i++) {
        const rowStr = (raw[i] || []).join('');
        if(rowStr.includes('Host') || rowStr.includes('장비명')) { headerIdx = i; break; }
    }

    const headers = raw[headerIdx];
    const jsonData = [];
    for(let i=headerIdx+1; i<raw.length; i++) {
        if(!raw[i] || raw[i].length === 0) continue;
        let obj = {};
        headers.forEach((h, idx) => { if(h) obj[h.toString().trim()] = raw[i][idx]; });
        jsonData.push(obj);
    }
    renderDashboard(jsonData);
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

function renderDashboard(data) {
  let upgradeCnt = 0, eosCnt = 0, okCnt = 0;
  let vendors = {};

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = data.map(row => {
    //  엑셀 컬럼명 정밀 매핑 (공백 및 특수문자 대응)
    const name = row['장비명(Hostname)'] || row['Hostname'] || '-';
    const type = row['장비 구분'] || row['구분'] || '-';
    const vendor = row['제조사'] || '-';
    const cur = String(row['OS/NOS 현재버전'] || row['현재 버전'] || row['현재버전'] || '');
    const std = String(row['OS/NOS 권고버전'] || row['권고 버전'] || row['권고버전'] || '');
    const status = String(row['EOS상태'] || row['상태'] || '');

    // 판별 로직 [cite: 119-130]
    const isMismatch = (cur !== std && std !== '' && std !== 'undefined');
    const isEos = status.includes('경과') || status.includes('위험') || status.includes('임박');

    if(isMismatch) upgradeCnt++;
    if(cur === std && cur !== '') okCnt++;
    if(isEos) eosCnt++;
    if(vendor !== '-') vendors[vendor] = (vendors[vendor] || 0) + 1;

    return `<tr>
      <td><b>${name}</b></td>
      <td><span style="color:var(--muted)">${type}</span> / ${vendor}</td>
      <td style="color:${isMismatch ? 'var(--yellow)' : ''}">${cur}</td>
      <td style="color:var(--green)">${std}</td>
      <td><span class="badge" style="background:${isMismatch || isEos ? 'rgba(224,92,92,0.1)' : 'rgba(92,224,138,0.1)'}; color:${isMismatch || isEos ? 'var(--red)' : 'var(--green)'}">${isMismatch ? '버전 미준수' : isEos ? '위험' : '정상'}</span></td>
    </tr>`;
  }).join('');

  // KPI 업데이트 [cite: 75-81, 119-124]
  document.getElementById('total-val').innerText = data.length;
  document.getElementById('upgrade-val').innerText = upgradeCnt;
  document.getElementById('eos-val').innerText = eosCnt;
  document.getElementById('rate-val').innerText = data.length > 0 ? Math.round((okCnt / data.length) * 100) + '%' : '0%';

  updateCharts(vendors, okCnt, upgradeCnt);
}

function updateCharts(vData, ok, fail) {
  if(charts.bar) charts.bar.destroy();
  if(charts.pie) charts.pie.destroy();

  const commonOpt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#e2e6f0' } } } };
  
  charts.bar = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: Object.keys(vData), datasets: [{ label: '제조사분포', data: Object.values(vData), backgroundColor: '#509ee3' }] },
    options: commonOpt
  });

  charts.pie = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: ['준수', '미준수'], datasets: [{ data: [ok, fail], backgroundColor: ['#5ce08a', '#e0c45c'], borderWidth: 0 }] },
    options: commonOpt
  });
}
</script>
</body>
</html>
